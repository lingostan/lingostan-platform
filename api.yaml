info:
  title: Lingostan API
  description: ''
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    AlphabetItemDto:
      type: object
      properties:
        letter:
          type: string
        transcription:
          type: string
        audioUrl:
          type: string
      required:
        - letter
        - transcription
    LanguageResponseDto:
      type: object
      properties:
        id:
          type: number
        code:
          type: string
        name:
          type: string
        flagEmoji:
          type: string
        flagUrl:
          type: string
        description:
          type: string
        difficulty:
          type: number
        isActive:
          type: boolean
        totalModules:
          type: number
        totalExercises:
          type: number
        createdAt:
          format: date-time
          type: string
        alphabet:
          type: array
          items:
            $ref: '#/components/schemas/AlphabetItemDto'
      required:
        - id
        - code
        - name
        - flagEmoji
        - flagUrl
        - description
        - difficulty
        - isActive
        - totalModules
        - totalExercises
        - createdAt
        - alphabet
    UserLanguageDto:
      type: object
      properties:
        id:
          type: number
        language:
          $ref: '#/components/schemas/LanguageResponseDto'
        level:
          type: number
        progress:
          type: number
        isActive:
          type: boolean
        totalPoints:
          type: number
        streak:
          type: number
        startedAt:
          format: date-time
          type: string
        lastPracticedAt:
          format: date-time
          type: string
      required:
        - id
        - language
        - level
        - progress
        - isActive
        - totalPoints
        - streak
