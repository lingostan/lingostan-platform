openapi: 3.0.0
paths:
  /api/users/profile:
    get:
      operationId: UsersController_getProfile
      parameters: []
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
      security:
        - bearer: []
      summary: Получить профиль пользователя
      tags:
        - Users
  '/api/users/{id}':
    put:
      operationId: UsersController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        description: Данные для обновления
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: Пользователь успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
      security:
        - bearer: []
      summary: Обновить данные пользователя
      tags:
        - Users
  /api/users/languages:
    get:
      operationId: UsersController_getUserLanguages
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserLanguageDto'
      security:
        - bearer: []
      summary: Получить языки пользователя
      tags:
        - Users
  /api/auth/register:
    post:
      description: Создает нового пользователя и возвращает токены доступа
      operationId: AuthController_register
      parameters: []
      requestBody:
        required: true
        description: Данные для регистрации
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponseDto'
      summary: Регистрация пользователя
      tags:
        - Auth
  /api/auth/login:
    post:
      description: Аутентификация пользователя и выдача токенов
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        description: Учетные данные для входа
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponseDto'
      summary: Вход в систему
      tags:
        - Auth
  /api/auth/refresh:
    post:
      description: Обновляет access token с помощью refresh token из cookies или тела запроса
      operationId: AuthController_refresh
      parameters: []
      requestBody:
        required: false
        description: 'Refresh token (опционально, если есть в cookies)'
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  description: 'Refresh token, если не передан в cookies'
      responses:
        '200':
          description: Токены успешно обновлены
          content:
            application/json:
              schema:
                example:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      summary: Обновление токенов
      tags:
        - Auth
  /api/auth/logout:
    post:
      description: Удаляет refresh token из cookies
      operationId: AuthController_logout
      parameters: []
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                example:
                  success: true
      summary: Выход из системы
      tags:
        - Auth
  /api/languages:
