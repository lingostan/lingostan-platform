          schema:
            example: true
            type: boolean
        - name: withAlphabet
          required: false
          in: query
          description: Включить алфавит в ответ
          schema:
            example: false
            type: boolean
      responses:
        '200':
          description: Список языков успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LanguageResponseDto'
      security:
        - bearer: []
      summary: Получить все языки
      tags:
        - Language
    post:
